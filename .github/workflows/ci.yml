name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        run: rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check

      - name: Run tests
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings
